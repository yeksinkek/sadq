name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name 'fDenyTSConnections' -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name 'UserAuthentication' -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name 'SecurityLayer' -Value 0 -Force
          netsh advfirewall firewall delete rule name='RDP-Tailscale'
          netsh advfirewall firewall add rule name='RDP-Tailscale' dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Create RDP User with Four-Digit PIN
        run: |
          $policyFile = Join-Path $env:TEMP 'rdp-security-policy.inf'
          secedit /export /cfg $policyFile | Out-Null
          (Get-Content -LiteralPath $policyFile) -replace 'MinimumPasswordLength = .*', 'MinimumPasswordLength = 4' -replace 'PasswordComplexity = .*', 'PasswordComplexity = 0' | Set-Content -LiteralPath $policyFile -Encoding Unicode
          secedit /configure /db "$env:TEMP\rdp-security-policy.sdb" /cfg $policyFile /areas SECURITYPOLICY | Out-Null
          $password = -join (1..4 | ForEach-Object { Get-Random -Minimum 0 -Maximum 10 })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name 'RDP' -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group 'Administrators' -Member 'RDP'
          Add-LocalGroupMember -Group 'Remote Desktop Users' -Member 'RDP'
          echo "RDP_PIN=$password" >> $env:GITHUB_ENV

      - name: Create Eight Visible Browser Profiles at RDP Logon
        run: |
          $scriptDirectory = 'C:\ProgramData\RDP'
          $scriptPath = Join-Path $scriptDirectory 'create-visible-browser-profiles.ps1'
          New-Item -ItemType Directory -Path $scriptDirectory -Force | Out-Null
          $profileScript = @'
$chrome = @("${env:ProgramFiles(x86)}\Google\Chrome\Application\chrome.exe", "$env:ProgramFiles\Google\Chrome\Application\chrome.exe") | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
$edge = @("${env:ProgramFiles(x86)}\Microsoft\Edge\Application\msedge.exe", "$env:ProgramFiles\Microsoft\Edge\Application\msedge.exe") | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
$browserExe = if ($chrome) { $chrome } else { $edge }
if (-not $browserExe) { throw 'Neither Google Chrome nor Microsoft Edge was found.' }

$dataRoot = if ($browserExe -match '\\Google\\Chrome\\') {
  Join-Path $env:LOCALAPPDATA 'Google\Chrome\User Data'
} else {
  Join-Path $env:LOCALAPPDATA 'Microsoft\Edge\User Data'
}
New-Item -ItemType Directory -Path $dataRoot -Force | Out-Null

$profiles = 1..8 | ForEach-Object { "Profile $_" }
$infoCache = [ordered]@{}
foreach ($profile in $profiles) {
  $profilePath = Join-Path $dataRoot $profile
  New-Item -ItemType Directory -Path $profilePath -Force | Out-Null
  @{ profile = @{ name = $profile } } | ConvertTo-Json -Depth 4 | Set-Content -LiteralPath (Join-Path $profilePath 'Preferences') -Encoding UTF8
  $infoCache[$profile] = @{ name = $profile; user_name = ''; gaia_name = ''; is_using_default_name = $false }
}

@{ profile = @{ info_cache = $infoCache; profiles_order = $profiles; last_used = 'Profile 1' } } |
  ConvertTo-Json -Depth 8 | Set-Content -LiteralPath (Join-Path $dataRoot 'Local State') -Encoding UTF8

Start-Process -FilePath $browserExe -ArgumentList '--no-first-run', '--profile-directory=Profile 1', 'about:blank'
'@
          Set-Content -LiteralPath $scriptPath -Value $profileScript -Encoding UTF8
          $taskName = 'CreateVisibleBrowserProfiles'
          Unregister-ScheduledTask -TaskName $taskName -Confirm:$false -ErrorAction SilentlyContinue
          $action = New-ScheduledTaskAction -Execute "$env:SystemRoot\System32\WindowsPowerShell\v1.0\powershell.exe" -Argument "-NoProfile -ExecutionPolicy Bypass -File `"$scriptPath`""
          $trigger = New-ScheduledTaskTrigger -AtLogOn -User 'RDP'
          $principal = New-ScheduledTaskPrincipal -UserId 'RDP' -LogonType Interactive -RunLevel Limited
          Register-ScheduledTask -TaskName $taskName -Action $action -Trigger $trigger -Principal $principal -Force | Out-Null

      - name: Install Tailscale
        run: |
          $installerPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri 'https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi' -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList '/i', "`"$installerPath`"", '/quiet', '/norestart' -Wait
          Remove-Item $installerPath -Force

      - name: Establish Tailscale Connection
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-$env:GITHUB_RUN_ID
          $tsIP = $null
          1..10 | ForEach-Object { if (-not $tsIP) { $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4; Start-Sleep -Seconds 5 } }
          if (-not $tsIP) { throw 'Tailscale IP not assigned.' }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Maintain Connection
        run: |
          Write-Host "Address: $env:TAILSCALE_IP"
          Write-Host "Username: RDP"
          Write-Host "PIN: $env:RDP_PIN"
          Write-Host 'Eight visible Chrome/Edge profiles will be created when RDP logs on.'
          while ($true) { Start-Sleep -Seconds 300 }
